version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sage-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sage_db
    ports:
      - '5432:5432'
    volumes:
      - sage_db_data:/var/lib/postgresql/data

volumes:
  sage_db_data:
